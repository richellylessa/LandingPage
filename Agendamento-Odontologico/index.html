<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamento Odontológico</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<header>
  <h1>OdontoCare</h1>
  <button>Agendar Agora</button>
</header>

<main>

  <section class="hero">

    <!-- IMAGEM -->
    <img src="./imagem/Sorriso perfeito começa aqui.png" alt="Dentista com prótese">

    <!-- TEXTO + FORM -->
    <div class="content">
      <h2>Sorriso perfeito</h2>
      <h3>começa aqui...</h3>

      <p>Agende sua consulta com profissionais qualificados de forma rápida e segura.</p>

      <div class="form-box">
        <form>
          <input type="text" placeholder="Nome Completo" required>
          <input type="email" placeholder="Seu email" required>

          <select required>
            <option value="">Selecione o serviço</option>
            <option>Limpeza</option>
            <option>Ortodontia</option>
            <option>Implante</option>
          </select>

          <input type="date" required>
          <input type="time" required>

          <button type="submit">Agendar Consulta</button>
        </form>
      </div>

    </div>

  </section>

</main>

<footer>
  © 2026 OdontoCare - Todos os direitos reservados
</footer>

</body>
</html>
